llm:
  model: "gpt-4o-mini"
  temperature: 0.3
  max_tokens: 4096

embedding:
  model: "text-embedding-3-small"

chroma:
  persist_dir: "./chroma_db"
  collection_name: "dsa_concepts"

session:
  max_topics: 5
  max_depth_per_topic: 3
  max_total_turns: 30

retrieval:
  top_k: 5
  similarity_threshold: 0.7
